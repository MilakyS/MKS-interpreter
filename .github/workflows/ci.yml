name: MKS CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Create stress test
        run: |
          cat > stress_test.mks <<'EOF'
          Writeln("CI start");
          var arr =: [];
          for(var i =: 0; i < 1000; i =: i + 1) ->
              arr.inject("item_" + i);
          <-
          Writeln(arr.size());

          fnc fib(n) ->
              if(n <= 1) ->
                  return n;
              <-
              return fib(n - 1) + fib(n - 2);
          <-

          Writeln(fib(10));
          Writeln("CI end");
          EOF

      - name: Run stress test
        run: ./build/mks stress_test.mks

  sanitizer:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Configure sanitizer build
        run: cmake -B build-asan -DCMAKE_BUILD_TYPE=Debug -DENABLE_ASAN=ON

      - name: Build sanitizer
        run: cmake --build build-asan --config Debug

      - name: Create sanitizer test
        run: |
          cat > san_test.mks <<'EOF'
          var arr =: [];
          for(var i =: 0; i < 2000; i =: i + 1) ->
              arr.inject("x_" + i);
          <-
          Writeln(arr.size());
          EOF

      - name: Run sanitizer test
        run: ASAN_OPTIONS=detect_leaks=1 ./build-asan/mks san_test.mks